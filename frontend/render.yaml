services:
  - type: static_site
    name: fiveminds-frontend
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://5iveminds-production.up.railway.app
